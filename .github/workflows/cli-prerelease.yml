name: CLI Pre-Release (Snapshot)

on:
  push:
    branches:
      - poc-cli
    paths:
      - "apps/cli/**"
      - ".goreleaser.yml"
      - ".github/workflows/cli-prerelease.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run GoReleaser Snapshot
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CLI Binaries
        uses: actions/upload-artifact@v4
        with:
          name: zitadel-cli-snapshot
          path: |
            dist/zitadel-cli_*/
          retention-days: 14
