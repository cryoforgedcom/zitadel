name: Docs

on:
  push:
    branches:
      - dagger-prototype
  pull_request:

jobs:
  build:
    name: Build Docs with Dagger
    runs-on: depot-ubuntu-22.04-8
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build Docs
        uses: dagger/dagger-for-github@v6
        with:
          version: "latest"
          verb: call
          args: build -m ./apps/docs/dagger --source .
